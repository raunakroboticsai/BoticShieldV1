sentence=Motor control library for Botic Shield V1 (L293D + 74HC595).
paragraph=Provides simple forward, backward, left, right, stop, setSpeed and moveFor functions for 4-wheel differential-drive robots. Uses a 74HC595 shift register to control two L293D H-bridge ICs, freeing up Arduino I/O pins.
